<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <title>Contact - Fanni Ardiansyah</title>
  </head>
  <body>
    <header>
      <nav>
        <div class="menu-icon" id="menu-icon">
          <i class="fas fa-bars"></i>
        </div>
        <ul class="nav-list" id="nav-list">
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="skills.html">Skills</a></li>
          <li><a href="projects.html">Projects</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <section class="contact">
        <h2>Kontak Saya</h2>
        <p>
          Jika Anda ingin menghubungi saya, silakan gunakan salah satu metode
          berikut:
        </p>
        <div class="contact-icons">
          <a
            href="https://instagram.com/@fanniardsyah"
            target="_blank"
            class="social-icon"
            ><i class="fab fa-instagram"></i
          ></a>
          <a
            href="https://twitter.com/@fanniardsyah"
            target="_blank"
            class="social-icon"
            ><i class="fab fa-twitter"></i
          ></a>
          <a
            href="https://github.com/@fanniardiansyah"
            target="_blank"
            class="social-icon"
            ><i class="fab fa-github"></i
          ></a>
          <a
            href="https://discord.com/users/@fanniardiansyah"
            target="_blank"
            class="social-icon"
            ><i class="fab fa-discord"></i
          ></a>
          <a
            href="https://linkedin.com/in/@fanniardiansyah"
            target="_blank"
            class="social-icon"
            ><i class="fab fa-linkedin"></i
          ></a>
          <a
            href="https://youtube.com/@fanniardiansyah"
            target="_blank"
            class="social-icon"
            ><i class="fab fa-youtube"></i
          ></a>
        </div>
        <div class="email-contact">
          <h3>Kirim Email</h3>
          <form
            action="mailto:fanniardiansyah@proton.me"
            method="post"
            enctype="text/plain"
            class="contact-form"
          >
            <input type="text" name="name" placeholder="Nama Anda" required />
            <input
              type="email"
              name="email"
              placeholder="Email Anda"
              required
            />
            <textarea
              name="message"
              placeholder="Pesan Anda"
              required
            ></textarea>
            <button type="submit">Kirim Pesan</button>
          </form>
        </div>
      </section>
    </main>
    <footer>
      <p>
        &copy; <span id="year"></span> Fanni Ardiansyah. All rights reserved.
      </p>
    </footer>
    <script src="script.js"></script>
  </body>
</html>
